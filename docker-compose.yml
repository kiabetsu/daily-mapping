services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planning_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d planning_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  backend:
    build: ./backend
    ports:
      - '3001:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:pass@postgres:5432/planning_db
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes: 
  postgres_:
